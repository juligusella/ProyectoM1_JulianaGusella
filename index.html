<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" /> 
    <title>Colorfly Studio</title>
  </head>

  <body>
    <header>
      <nav class="nav">
        <span class="header__logo">Colorfly Studio</span>
        <ul class="nav__links">
          <li><a class="nav__link" href="#generador">Generador</a></li>
          <li><a class="nav__link" href="#guardadas">Guardadas</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="generador">
        <h2 id="titulo">Crea tu paleta aleatoria</h2>

        <div class="controles">
          <div class="controles__campo">
            <label class="controles__label" for="cantidad">Cantidad de colores:</label>
            <select class="select" id="cantidad">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
          </div>

          <button class="boton boton--primario" id="generar">Generar paleta</button>

          <button class="boton boton--primario" id="guardar">Guardar paleta</button>

        </div>

        <section class="galeria" id="galeria"></section>
      </section>
    </main>

    <footer>
      <p>Colorfly Studio &copy; 2026</p>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="./js/index.js"></script>
  </body>
</html>
